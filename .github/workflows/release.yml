name: Release

# Publishes @jadapps/guard to npm when a version tag is pushed. The package is
# published with npm provenance — a signed, OIDC-backed attestation linking the
# published tarball to this workflow run and commit.

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (OIDC build attestation)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck, lint, test)
        run: npm run check

      - name: Build
        run: npm run build

      # `publishConfig` in package.json sets `provenance: true` and
      # `access: public`, so a plain `npm publish` emits a provenance
      # attestation given the `id-token: write` permission above.
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
